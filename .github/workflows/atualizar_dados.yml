name: Atualizar dados PLS

# Dispara quando o Excel for atualizado no repositório
on:
  push:
    paths:
      - "data/PLS.xlsx"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  converter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install pandas openpyxl

      - name: Converter Excel → JSON
        run: python scripts/excel_to_json.py

      - name: Commitar JSON atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pls_data.json
          git diff --cached --quiet || git commit -m "dados: atualiza pls_data.json [auto]"
          git push
